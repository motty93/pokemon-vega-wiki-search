{{define "content"}}
<style>
  .hero-bg {
    position: relative;
    background:
      linear-gradient(135deg,
        rgba(255,255,255,0.06) 25%, transparent 25%, transparent 50%,
        rgba(255,255,255,0.06) 50%, rgba(255,255,255,0.06) 75%, transparent 75%),
      linear-gradient(to right, #065f46, #059669, #0d9488);
    background-size: 40px 40px, 100% 100%;
  }
  .hero-overlay {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.6s ease;
    pointer-events: none;
    z-index: 0;
  }
  .hero-overlay.active {
    opacity: 1;
  }
  .hero-bg > *:not(.hero-overlay) {
    position: relative;
    z-index: 1;
  }
  .sticky-header {
    position: fixed;
    top: -60px;
    left: 0;
    right: 0;
    z-index: 40;
    transition: top 0.3s ease;
    overflow: hidden;
  }
  .sticky-header.visible {
    top: 0;
  }
  .sticky-header-overlay {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.6s ease;
    pointer-events: none;
    z-index: 0;
  }
  .sticky-header-overlay.active {
    opacity: 1;
  }
  .sticky-header > *:not(.sticky-header-overlay) {
    position: relative;
    z-index: 1;
  }
</style>

<!-- スティッキーヘッダー（スクロールで出現） -->
<div id="sticky-header" class="sticky-header vega-header text-white shadow-lg" style="background: linear-gradient(to right, #065f46, #059669, #0d9488)">
  <div id="sticky-header-overlay" class="sticky-header-overlay"></div>
  <div class="px-4 py-4 flex items-center justify-between">
    <a href="/" class="flex items-center gap-2 hover:opacity-90 transition-opacity">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><line x1="2" y1="12" x2="9" y2="12"/><line x1="15" y1="12" x2="22" y2="12"/>
      </svg>
      <span class="text-lg font-black tracking-tight">VEGA DEX</span>
    </a>
    <span class="text-sm text-white/60 hidden sm:block">Pokemon Vega Pokedex</span>
  </div>
</div>

<!-- ヒーロー: フルスクリーン検索 -->
<div id="hero" class="hero-bg min-h-screen flex flex-col">
  <div id="hero-overlay" class="hero-overlay"></div>

  <!-- ヘッダー（最小限） -->
  <header class="px-4 py-4" role="banner">
    <a href="/" class="inline-flex items-center gap-2 text-white/80 hover:text-white transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><line x1="2" y1="12" x2="9" y2="12"/><line x1="15" y1="12" x2="22" y2="12"/>
      </svg>
      <span class="text-lg font-black tracking-tight">VEGA DEX</span>
    </a>
  </header>

  <!-- メイン検索エリア -->
  <main id="main-content" class="flex-1 flex flex-col items-center justify-center px-4 -mt-16" role="main">
    <h1 class="text-white text-3xl sm:text-4xl font-black tracking-tight mb-2">ポケモンベガ 図鑑検索</h1>
    <p class="text-white/60 text-sm mb-8">386匹のポケモンデータを高速検索</p>

    <form hx-get="/search" hx-target="#results" hx-trigger="submit" hx-indicator="#loading"
      role="search" aria-label="ポケモン検索"
      class="w-full max-w-xl">

      <!-- 検索バー -->
      <div class="flex items-center bg-white rounded-full shadow-2xl shadow-black/20">
        <label for="search-query" class="sr-only">ポケモン名で検索</label>
        <input type="text" id="search-query" name="q"
          placeholder="ポケモン名で検索..."
          class="flex-1 px-6 py-4 text-base rounded-l-full bg-transparent focus:outline-none text-gray-800 placeholder-gray-400"
          autocomplete="off">
        <button type="submit" class="px-5 py-4 rounded-r-full text-slate-400 hover:text-emerald-600 transition-colors hidden sm:block" aria-label="検索">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </button>
      </div>

      <!-- モバイル用検索ボタン -->
      <button type="submit" class="sm:hidden w-full mt-5 py-3 rounded-full bg-white/15 hover:bg-white/25 active:bg-white/30 text-white font-bold text-sm tracking-wide transition-colors backdrop-blur-sm border border-white/20">
        検索する
      </button>
    </form>

    <p class="text-white/40 text-xs mt-6 text-center leading-relaxed">
      ポケモン名をあいまい検索できます
    </p>
  </main>

  <!-- ローディング -->
  <div id="loading" class="htmx-indicator fixed inset-0 z-50 bg-slate-900/80 flex items-center justify-center" aria-live="polite">
    <div class="text-center" role="status">
      <div class="flex items-center justify-center gap-2 mb-2">
        <span class="loading-dot !bg-white"></span>
        <span class="loading-dot !bg-white"></span>
        <span class="loading-dot !bg-white"></span>
      </div>
      <p class="text-slate-400 text-sm">検索中...</p>
    </div>
  </div>

  <!-- フッター -->
  <footer class="text-center py-4 text-white/30 text-xs" role="contentinfo">
    VEGA DEX &mdash; Pokemon Vega Wiki Data
  </footer>
</div>

<!-- トースト通知 -->
<div id="toast" class="fixed top-4 right-4 z-50 pointer-events-none opacity-0 transition-all duration-300 translate-x-2" role="status" aria-live="polite">
  <div class="pointer-events-auto bg-white/90 backdrop-blur-sm rounded-lg shadow-md border border-gray-200 px-3 py-2 flex items-center gap-2">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-gray-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <span id="toast-message" class="text-xs text-gray-500"></span>
  </div>
</div>

<!-- 検索結果（ヒーロー外に表示） -->
<div id="results" class="container mx-auto px-4" aria-live="polite" aria-atomic="false"></div>

<!-- エラー -->
<div id="error-display" class="hidden text-center py-8">
  <div class="inline-flex items-center gap-2 bg-red-50 text-red-600 rounded-xl px-6 py-3 text-sm font-medium" role="alert">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
    検索に失敗しました。もう一度お試しください。
  </div>
</div>

<script>
  var stickyHeader = document.getElementById('sticky-header');
  var searchInput = document.getElementById('search-query');
  var resultsDiv = document.getElementById('results');
  var heroOverlay = document.getElementById('hero-overlay');
  var stickyOverlay = document.getElementById('sticky-header-overlay');

  // hex色を暗くする
  function darkenHex(hex, factor) {
    var r = parseInt(hex.slice(1, 3), 16);
    var g = parseInt(hex.slice(3, 5), 16);
    var b = parseInt(hex.slice(5, 7), 16);
    r = Math.round(r * factor); g = Math.round(g * factor); b = Math.round(b * factor);
    return '#' + [r, g, b].map(function(c) { return ('0' + Math.min(255, c).toString(16)).slice(-2); }).join('');
  }

  // 検索結果のdominant typeカラーでヒーローとスティッキーヘッダーのグラデーションを変更
  function updateHeroGradient() {
    var wrapper = resultsDiv.querySelector('[data-dominant-color]');
    if (!wrapper) return;
    var color = wrapper.getAttribute('data-dominant-color');
    if (!color) return;

    var dark = darkenHex(color, 0.35);
    var mid = darkenHex(color, 0.55);
    var light = darkenHex(color, 0.7);
    var newBg =
      'linear-gradient(135deg, rgba(255,255,255,0.06) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.06) 50%, rgba(255,255,255,0.06) 75%, transparent 75%),' +
      'linear-gradient(to right, ' + dark + ', ' + mid + ', ' + light + ')';

    var headerBg = 'linear-gradient(to right, ' + dark + ', ' + mid + ', ' + light + ')';

    // localStorageに保存
    localStorage.setItem('vegadex-gradient', JSON.stringify({ dark: dark, mid: mid, light: light }));

    // 既にactiveなら一旦フェードアウトしてから切り替え
    if (heroOverlay.classList.contains('active')) {
      heroOverlay.classList.remove('active');
      stickyOverlay.classList.remove('active');
      setTimeout(function() {
        heroOverlay.style.background = newBg;
        heroOverlay.style.backgroundSize = '40px 40px, 100% 100%';
        stickyOverlay.style.background = headerBg;
        requestAnimationFrame(function() {
          heroOverlay.classList.add('active');
          stickyOverlay.classList.add('active');
        });
      }, 300);
    } else {
      heroOverlay.style.background = newBg;
      heroOverlay.style.backgroundSize = '40px 40px, 100% 100%';
      stickyOverlay.style.background = headerBg;
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          heroOverlay.classList.add('active');
          stickyOverlay.classList.add('active');
        });
      });
    }
  }

  function showError() {
    document.getElementById('error-display').classList.remove('hidden');
  }

  function hideError() {
    document.getElementById('error-display').classList.add('hidden');
  }

  var toastTimer = null;
  function showToast(msg) {
    var toast = document.getElementById('toast');
    document.getElementById('toast-message').textContent = msg;
    toast.classList.remove('opacity-0', 'translate-x-2');
    toast.classList.add('opacity-100', 'translate-x-0');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() {
      toast.classList.remove('opacity-100', 'translate-x-0');
      toast.classList.add('opacity-0', 'translate-x-2');
    }, 3000);
  }

  function handleResultsSwap(e) {
    if (e.detail.target.id !== 'results') return;
    var noResults = e.detail.target.querySelector('[data-no-results]');
    if (noResults) {
      var msg = noResults.querySelector('span');
      showToast(msg ? msg.textContent : '見つかりませんでした');
      e.detail.target.innerHTML = '';
      return;
    }
    if (e.detail.target.innerHTML.trim()) {
      updateHeroGradient();
      stickyHeader.classList.add('visible');
      e.detail.target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }

  // 検索後にURLのクエリパラメータを更新
  function pushSearchParams(e) {
    if (e.detail.target.id !== 'results') return;
    var form = document.querySelector('form[hx-get="/search"]');
    var params = new URLSearchParams(new FormData(form)).toString();
    history.pushState({ query: params }, '', params ? '/?' + params : '/');
  }

  // クエリパラメータから検索を実行
  function executeSearchFromURL() {
    var params = new URLSearchParams(window.location.search);
    var q = params.get('q') || '';
    searchInput.value = q;

    if (q) {
      htmx.ajax('GET', '/search?' + params.toString(), { target: '#results' });
    } else {
      resultsDiv.innerHTML = '';
      stickyHeader.classList.remove('visible');
    }
  }

  document.body.addEventListener('htmx:responseError', showError);
  document.body.addEventListener('htmx:beforeRequest', hideError);
  document.body.addEventListener('htmx:afterSwap', handleResultsSwap);
  document.body.addEventListener('htmx:afterOnLoad', pushSearchParams);
  window.addEventListener('popstate', executeSearchFromURL);

  // ページ読み込み時にクエリパラメータがあれば検索を実行
  if (new URLSearchParams(window.location.search).get('q')) {
    executeSearchFromURL();
  }
</script>
{{end}}
