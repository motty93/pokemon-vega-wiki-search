{{template "base" .}}
{{define "content"}}
<div x-data="{ showAdvanced: false }">
  <div class="bg-white rounded-lg shadow p-6 mb-6">
    <h2 class="text-xl font-bold mb-4">ポケモン検索</h2>
    <form hx-get="/search" hx-target="#results" hx-trigger="submit" hx-indicator="#loading" role="search" aria-label="ポケモン検索">
      <div class="flex gap-4 mb-4">
        <div class="flex-1">
          <label for="search-query" class="sr-only">ポケモン名</label>
          <input type="text" id="search-query" name="q" placeholder="ポケモン名で検索..."
            class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-red-400"
            hx-get="/search" hx-trigger="keyup changed delay:300ms" hx-target="#results"
            autocomplete="off">
        </div>
        <div>
          <label for="search-type" class="sr-only">タイプ絞り込み</label>
          <select id="search-type" name="type" class="border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-red-400"
            hx-get="/search" hx-trigger="change" hx-target="#results" hx-include="[name='q']">
            <option value="">全タイプ</option>
            {{range .Types}}
            <option value="{{.}}">{{.}}</option>
            {{end}}
          </select>
        </div>
      </div>

      <button type="button" @click="showAdvanced = !showAdvanced"
        class="text-sm text-blue-600 hover:underline mb-4 focus:outline-none focus:ring-2 focus:ring-blue-400 rounded px-1"
        :aria-expanded="showAdvanced"
        aria-controls="advanced-filters">
        種族値フィルター <span x-text="showAdvanced ? '▲' : '▼'" aria-hidden="true"></span>
      </button>

      <div id="advanced-filters" x-show="showAdvanced" x-transition class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-4">
        {{range $stat := (slice "hp" "attack" "defense" "sp_atk" "sp_def" "speed")}}
        <fieldset>
          <legend class="block text-sm font-medium text-gray-600 capitalize">{{$stat}}</legend>
          <div class="flex gap-2">
            <label for="{{$stat}}_min" class="sr-only">{{$stat}} 最小値</label>
            <input type="number" id="{{$stat}}_min" name="{{$stat}}_min" placeholder="min" min="0" max="255"
              class="w-20 border rounded px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-red-400">
            <span class="self-center" aria-hidden="true">-</span>
            <label for="{{$stat}}_max" class="sr-only">{{$stat}} 最大値</label>
            <input type="number" id="{{$stat}}_max" name="{{$stat}}_max" placeholder="max" min="0" max="255"
              class="w-20 border rounded px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-red-400">
          </div>
        </fieldset>
        {{end}}
      </div>

      <button type="submit" class="bg-red-600 text-white px-6 py-2 rounded-lg hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-400 focus:ring-offset-2">
        検索
      </button>
    </form>
  </div>

  <div id="loading" class="htmx-indicator text-center py-4" aria-live="polite">
    <span class="text-gray-500" role="status">検索中...</span>
  </div>

  <div id="results" aria-live="polite" aria-atomic="false">
    <!-- htmxで検索結果が挿入される -->
  </div>

  <div id="error-display" class="hidden text-center py-4">
    <p class="text-red-600" role="alert">検索リクエストに失敗しました。もう一度お試しください。</p>
  </div>
  <script>
    document.body.addEventListener('htmx:responseError', function() {
      document.getElementById('error-display').classList.remove('hidden');
    });
    document.body.addEventListener('htmx:beforeRequest', function() {
      document.getElementById('error-display').classList.add('hidden');
    });
  </script>
</div>
{{end}}
