{{define "base"}}
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{if .PageTitle}}{{.PageTitle}}{{else}}ポケモンベガ 図鑑検索 | 種族値・技・入手方法{{end}}</title>
  <meta name="description" content="{{if .PageDescription}}{{.PageDescription}}{{else}}ポケモンベガ（ファンメイドROM）の図鑑データを検索・閲覧できるWebサイト。386匹のポケモンの種族値、技、入手方法を掲載。{{end}}">
  {{if .CanonicalURL}}<link rel="canonical" href="{{.CanonicalURL}}">{{end}}
  <meta property="og:title" content="{{if .PageTitle}}{{.PageTitle}}{{else}}ポケモンベガ 図鑑検索{{end}}">
  <meta property="og:description" content="{{if .PageDescription}}{{.PageDescription}}{{else}}ポケモンベガの図鑑データを高速検索。種族値・技・入手方法を網羅。{{end}}">
  <meta property="og:type" content="{{if .OGType}}{{.OGType}}{{else}}website{{end}}">
  <meta property="og:locale" content="ja_JP">
  {{if .CanonicalURL}}<meta property="og:url" content="{{.CanonicalURL}}">{{end}}
  {{if .OGImage}}<meta property="og:image" content="{{.OGImage}}">{{end}}
  <script>
    (function(){
      var c = localStorage.getItem('vegadex-gradient');
      if (!c) return;
      try {
        var g = JSON.parse(c);
        var s = document.createElement('style');
        s.textContent =
          '.hero-bg{background:linear-gradient(135deg,rgba(255,255,255,.06) 25%,transparent 25%,transparent 50%,rgba(255,255,255,.06) 50%,rgba(255,255,255,.06) 75%,transparent 75%),linear-gradient(to right,'+g.dark+','+g.mid+','+g.light+')!important;background-size:40px 40px,100% 100%!important}'+
          '.vega-header{background:linear-gradient(to right,'+g.dark+','+g.mid+','+g.light+')!important}';
        document.head.appendChild(s);
      } catch(e) {}
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Noto Sans JP"', 'system-ui', '-apple-system', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  {{if .JSONLD}}<script type="application/ld+json">{{.JSONLD}}</script>{{end}}
  <link rel="stylesheet" href="/static/css/app.css">
  </head>
<body class="bg-gradient-to-br from-slate-50 to-gray-100 min-h-screen">
  <a href="#main-content" class="skip-link">メインコンテンツへスキップ</a>
  {{template "content" .}}
</body>
</html>
{{end}}
