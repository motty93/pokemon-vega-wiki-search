root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/server ./cmd/server"
  bin = "./tmp/server"
  include_ext = ["go", "html"]
  include_dir = ["cmd", "internal", "templates"]
  exclude_dir = ["tmp", "bin", "static", "docs"]
  delay = 1000

[log]
  time = true

[misc]
  clean_on_exit = true
